# ASTRA-LM Laptop Distillation Train Config
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
learning_rate: 0.0003
weight_decay: 0.01
max_steps: 10000
warmup_steps: 500
min_lr_ratio: 0.1
eval_steps: 500
save_steps: 1000
logging_steps: 10
max_eval_batches: 20
output_dir: outputs/astra_mini_distill

gradient_accumulation_steps: 4
mixed_precision: auto
max_grad_norm: 1.0
